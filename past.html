<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>過去問(PDF) | 総合試験対策</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #B8E4F0;
      --bg-bottom: #D6F0FA;
      --surface: #FFFFFF;
      --primary: #1A6B8A;
      --primary-dark: #124E66;
      --accent: #2A9D8F;
      --text: #0F3D4D;
      --text-muted: #4A7A8A;
      --border: #A8D8E8;
      --shadow: 0 4px 20px rgba(26,107,138,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
    }
    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      background: var(--primary);
      padding: 20px 20px 20px;
      display: flex; align-items: center; gap: 14px;
      flex-shrink: 0;
    }
    .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,0.15);
      color: #fff; text-decoration: none;
      font-size: 18px; flex-shrink: 0;
    }
    .back-btn:active { background: rgba(255,255,255,0.25); }
    .header-text { flex: 1; }
    .header-text h1 { font-size: 18px; font-weight: 900; color: #fff; }
    .header-text p  { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }

    .drive-open-btn {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      padding: 7px 12px;
      color: #fff;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 12px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .drive-open-btn:active { background: rgba(255,255,255,0.25); }

    /* NOTE */
    .note {
      background: rgba(255,255,255,0.75);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      flex-shrink: 0;
    }
    .note strong { color: var(--primary-dark); }

    /* DRIVE FRAME */
    .drive-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .drive-frame {
      width: 100%;
      flex: 1;
      border: none;
      background: #fff;
      min-height: calc(100vh - 140px);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <a href="./index.html" class="back-btn">←</a>
    <div class="header-text">
      <h1>過去問 (PDF)</h1>
      <p>ファイルをタップして閲覧</p>
    </div>
    <a href="https://drive.google.com/drive/folders/1vApDKtna8Q8etytVqQDrb7jFvC8Dt6-9"
       target="_blank" rel="noopener" class="drive-open-btn">
      🔗 Driveで開く
    </a>
  </div>

  <!-- NOTE -->
  <div class="note">
    📌 ファイル名をタップするとPDFが開きます。表示されない場合は右上「Driveで開く」をご利用ください。
  </div>

  <!-- Googleドライブ フォルダ埋め込み -->
  <div class="drive-wrap">
    <iframe
      class="drive-frame"
      src="https://drive.google.com/embeddedfolderview?id=1vApDKtna8Q8etytVqQDrb7jFvC8Dt6-9#list"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
