<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問題一覧 | 総合試験対策</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F0F8FC;
      --surface: #FFFFFF;
      --primary: #1A6B8A;
      --primary-dark: #124E66;
      --accent: #2A9D8F;
      --text: #0F3D4D;
      --text-muted: #4A7A8A;
      --border: #C8E8F0;
      --radius: 16px;
      --shadow: 0 2px 16px rgba(26,107,138,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      padding-bottom: 60px;
    }

    /* HEADER */
    .header {
      background: var(--primary);
      color: #fff;
      padding: 20px 16px 0;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,0.15);
    }
    .header-top {
      display: flex; align-items: center;
      gap: 12px; margin-bottom: 14px;
    }
    .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,0.15);
      color: #fff; text-decoration: none;
      font-size: 18px; flex-shrink: 0;
    }
    .back-btn:active { background: rgba(255,255,255,0.25); }
    .header-title { flex: 1; }
    .header-title h1 { font-size: 16px; font-weight: 900; }
    .header-title p  { font-size: 11px; opacity: 0.65; margin-top: 2px; }
    .count-badge {
      background: var(--accent);
      color: #fff; font-size: 12px; font-weight: 700;
      padding: 4px 10px; border-radius: 100px;
      flex-shrink: 0; white-space: nowrap;
    }

    /* SEARCH */
    .search-bar { position: relative; margin-bottom: 12px; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px; opacity: 0.5; pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 11px 40px 11px 36px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px; outline: none;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.5); }
    .search-input:focus { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.4); }
    .search-clear {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.2);
      border: none; color: #fff;
      width: 22px; height: 22px;
      border-radius: 50%; font-size: 12px;
      cursor: pointer; display: none;
      align-items: center; justify-content: center;
    }
    .search-clear.visible { display: flex; }

    /* FILTER TABS */
    .filter-row {
      display: flex; gap: 8px;
      overflow-x: auto; padding-bottom: 14px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0; padding: 7px 14px;
      border: none; border-radius: 100px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.75);
      transition: all 0.15s;
    }
    .filter-btn.active { background: #fff; color: var(--primary); }
    .filter-btn:active { transform: scale(0.95); }

    /* EXAM FILTER */
    .exam-filter-row {
      display: flex; gap: 6px;
      overflow-x: auto; padding-bottom: 12px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .exam-filter-row::-webkit-scrollbar { display: none; }
    .exam-btn {
      flex-shrink: 0; padding: 5px 12px;
      border: none; border-radius: 100px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      transition: all 0.15s;
    }
    .exam-btn.active { background: rgba(255,255,255,0.25); color: #fff; border: 1px solid rgba(255,255,255,0.4); }
    .exam-btn:active { transform: scale(0.95); }

    /* MAIN */
    .main { padding: 16px 16px 0; }
    .stats-bar { display: flex; align-items: center; margin-bottom: 14px; }
    .stats-text { font-size: 13px; color: var(--text-muted); }
    .stats-text strong { color: var(--primary); font-weight: 700; }

    /* SUBJECT COUNTS */
    .subject-counts { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .count-chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; padding: 4px 10px;
      font-size: 12px; color: var(--text-muted);
    }
    .count-chip .dot { width: 7px; height: 7px; border-radius: 50%; }

    /* CARDS */
    .cards-list { display: flex; flex-direction: column; gap: 12px; }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border-left: 4px solid var(--border);
      animation: cardIn 0.25s ease both;
    }
    .card-header {
      display: flex; align-items: center;
      gap: 8px; padding: 14px 14px 8px;
      flex-wrap: wrap;
    }
    .q-number { font-size: 11px; font-weight: 700; color: var(--text-muted); }
    .subject-tag {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 700;
    }
    .exam-tag {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 100px;
      font-size: 10px; font-weight: 700;
      background: rgba(26,107,138,0.08);
      color: var(--primary);
      margin-left: auto;
    }

    /* 正答率バッジ */
    .correct-rate {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 10px; border-radius: 100px;
      font-size: 12px; font-weight: 700;
      margin-left: auto;
      flex-shrink: 0;
    }
    .correct-rate.high   { background: rgba(46,125,90,0.12);  color: #2E7D5A; } /* 80%以上 */
    .correct-rate.mid    { background: rgba(212,118,59,0.12); color: #C4631A; } /* 50〜79% */
    .correct-rate.low    { background: rgba(185,64,64,0.12);  color: #B94040; } /* 50%未満 */
    .card-body { padding: 0 14px 14px; }
    .card-body pre {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px; font-weight: 400;
      line-height: 1.8; color: var(--text);
      white-space: pre-wrap; word-break: break-all;
    }

    /* 画像ボタン */
    .image-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px; padding: 8px 16px;
      background: #EAF4FB; border: 1px solid #A8D8E8;
      border-radius: 10px; color: #1A6B8A;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .image-btn:hover  { background: #D0EAF7; }
    .image-btn:active { transform: scale(0.97); }

    /* STATES */
    .loading { text-align: center; padding: 60px 20px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    .loading p { color: var(--text-muted); font-size: 14px; }
    .error-msg {
      background: #FFF0F0; border: 1px solid #FFCCCC;
      border-radius: 12px; padding: 20px;
      text-align: center; display: none;
    }
    .error-msg.visible { display: block; }
    .error-msg p { color: #B94040; font-size: 14px; line-height: 1.8; }
    .empty-state { text-align: center; padding: 60px 20px; display: none; }
    .empty-state.visible { display: block; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state p { color: var(--text-muted); font-size: 15px; line-height: 1.7; }

    /* SCROLL TOP */
    .scroll-top {
      position: fixed; bottom: 24px; right: 20px;
      width: 44px; height: 44px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 50%;
      font-size: 18px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(26,107,138,0.3);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 50;
    }
    .scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    /* IMAGE MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.visible { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: #fff; border-radius: 16px;
      padding: 16px; max-width: 100%; max-height: 90vh;
      overflow-y: auto; position: relative; width: 100%;
    }
    .modal-close {
      position: absolute; top: 10px; left: 10px;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,0,0,0.1); border: none;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #333; z-index: 10;
    }
    .modal-close:hover { background: rgba(0,0,0,0.2); }
    .modal-img { width: 100%; height: auto; border-radius: 8px; margin-top: 8px; display: block; }
    .modal-error { text-align: center; padding: 20px; color: #B94040; font-size: 14px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

      <button class="modal-close" onclick="closeModal()">✕</button>
      <img class="modal-img" id="modalImg" src="" alt="問題画像"
           onerror="this.style.display='none'; document.getElementById('modalError').style.display='block'">
      <div class="modal-error" id="modalError" style="display:none;">
        ❌ 画像を読み込めませんでした。

<script>

// ============================================================

// 列インデックス（0始まり）
const COL_SUBJECT       = 2;

// 科目の表示順
const SUBJECT_ORDER = [

// 科目カラーマップ
const SUBJECT_COLORS = {

  '微生':         { border: '#7A3A5A', tag: 'rgba(122,58,90,0.12)',  text: '#7A3A5A' },

};
const DEFAULT_COLOR = { border: '#9AA5B0', tag: 'rgba(90,106,122,0.1)', text: '#5A6A7A' };
// ============================================================

let allQuestions   = [];
let currentSubject = '全部';
let currentExam    = 'all';
let currentSearch  = '';
let examMode       = 'all'; // 'all' or specific exam key

// URLパラメータから試験を取得
const urlParams = new URLSearchParams(window.location.search);
const examParam = urlParams.get('exam') || 'all';

// ===== CSV取得 =====
async function fetchCSV(sheetId, gid) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&t=${Date.now()}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

function parseCSV(text, examKey) {
  const clean = text.replace(/^\uFEFF/, '');
  const rows  = splitCSVRows(clean);
  const result = [];
  for (let i = 1; i < rows.length; i++) {
    const cols     = rows[i];
    const subject      = (cols[COL_SUBJECT]       || '').trim();
    const question     = (cols[COL_QUESTION]      || '').trim();
    const imageUrl     = (cols[COL_IMAGE]         || '').trim();
    const correctRate  = (cols[COL_CORRECT_RATE]  || '').trim();
    if (!subject && !question) continue;
    result.push({ id: i, subject, question, imageUrl, correctRate, examKey });
  }
  return result;
}

function splitCSVRows(text) {
  const rows = [];
  let cur = [], cell = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i+1];
    if (ch === '"') {
      if (inQuote && next === '"') { cell += '"'; i++; }
      else inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      cur.push(cell); cell = '';
    } else if (ch === '\r' && next === '\n' && !inQuote) {
      cur.push(cell); cell = ''; rows.push(cur); cur = []; i++;
    } else if (ch === '\n' && !inQuote) {
      cur.push(cell); cell = ''; rows.push(cur); cur = [];
    } else { cell += ch; }
  }
  if (cell || cur.length) { cur.push(cell); rows.push(cur); }
  return rows;
}

// ===== フィルタ =====
function buildExamFilter(loadedExams) {
  const row = document.getElementById('examFilterRow');
  if (examMode !== 'all' || loadedExams.length <= 1) { row.style.display = 'none'; return; }
  row.style.display = 'flex';
  row.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'exam-btn active';
  allBtn.textContent = 'すべて';
  allBtn.onclick = () => setExamFilter('all');
  row.appendChild(allBtn);

  loadedExams.forEach(key => {
    const src = EXAM_SOURCES[key];
    if (!src) return;
    const btn = document.createElement('button');
    btn.className = 'exam-btn';
    btn.textContent = src.name;
    btn.onclick = () => setExamFilter(key);
    row.appendChild(btn);
  });
}

function setExamFilter(key) {
  currentExam = key;
  document.querySelectorAll('.exam-btn').forEach(b => {
    b.classList.toggle('active',
      (key === 'all' && b.textContent === 'すべて') ||
      (key !== 'all' && EXAM_SOURCES[key] && b.textContent === EXAM_SOURCES[key].name)
    );
  });
  renderCards();
}

function buildSubjectFilter() {
  const row = document.getElementById('filterRow');
  row.innerHTML = '';

  const subjects = getAvailableSubjects();
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = '全科目';
  allBtn.onclick = () => setSubject('全部');
  row.appendChild(allBtn);

  subjects.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = s;
    btn.onclick = () => setSubject(s);
    row.appendChild(btn);
  });
}

function getAvailableSubjects() {
  const filtered = currentExam === 'all'
    ? allQuestions
    : allQuestions.filter(q => q.examKey === currentExam);
  const seen = new Set();
  const result = [];
  SUBJECT_ORDER.forEach(s => {
    if (filtered.some(q => q.subject === s)) { seen.add(s); result.push(s); }
  });
  filtered.forEach(q => {
    if (q.subject && !seen.has(q.subject)) { seen.add(q.subject); result.push(q.subject); }
  });
  return result;
}

function setSubject(subject) {
  currentSubject = subject;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === subject || (subject === '全部' && b.textContent === '全科目'));
  });
  renderCards();
}

function buildSubjectCounts(questions) {
  const container = document.getElementById('subjectCounts');
  const counts = {};
  questions.forEach(q => { if (q.subject) counts[q.subject] = (counts[q.subject] || 0) + 1; });
  container.innerHTML = '';
  Object.entries(counts).forEach(([s, n]) => {
    const color = (SUBJECT_COLORS[s] || DEFAULT_COLOR).border;
    const chip = document.createElement('div');
    chip.className = 'count-chip';
    chip.innerHTML = `<span class="dot" style="background:${color}"></span><span>${escapeHTML(s)} ${n}問</span>`;
    container.appendChild(chip);
  });
  container.style.display = 'flex';
}

// ===== フィルタ適用 =====
function getFiltered() {
  const kw = currentSearch.toLowerCase();
  return allQuestions.filter(q => {
    const matchExam    = currentExam === 'all' || q.examKey === currentExam;
    const matchSubject = currentSubject === '全部' || q.subject === currentSubject;
    const matchSearch  = kw === '' ||
      q.subject.toLowerCase().includes(kw) ||
      q.question.toLowerCase().includes(kw);
    return matchExam && matchSubject && matchSearch;
  });
}

// ===== カード描画 =====
function renderCards() {
  const list = document.getElementById('cardsList');
  const empty = document.getElementById('emptyState');
  const statsBar = document.getElementById('statsBar');

  const filtered = getFiltered();
  list.innerHTML = '';

  if (filtered.length === 0) {
    empty.classList.add('visible');
    statsBar.style.display = 'none';
  } else {
    empty.classList.remove('visible');
    statsBar.style.display = 'flex';
    document.getElementById('shownCount').textContent = filtered.length;
    filtered.forEach((q, idx) => list.appendChild(createCard(q, idx)));
  }

  // 科目フィルタを再構築（試験切り替え時に科目が変わるため）
  buildSubjectFilter();
  buildSubjectCounts(filtered.length > 0 ? filtered : allQuestions);
}

function createCard(q, idx) {
  const color   = SUBJECT_COLORS[q.subject] || DEFAULT_COLOR;
  const examSrc = EXAM_SOURCES[q.examKey];

  const card = document.createElement('div');
  card.className = 'card';
  card.style.borderLeftColor = color.border;
  card.style.animationDelay  = `${Math.min(idx * 0.03, 0.4)}s`;

  const imageBtn = q.imageUrl
    ? `<button class="image-btn" onclick="showImage('${escapeHTML(q.imageUrl)}')">🖼️ 画像を表示</button>`
    : '';

  const examTag = (examMode === 'all' && examSrc)
    ? `<span class="exam-tag">${escapeHTML(examSrc.name)}</span>`
    : '';

  // 正答率バッジ（G列に値がある場合のみ表示）
  let rateTag = '';
  if (q.correctRate !== '') {
    const rate = parseFloat(q.correctRate);
    const cls  = rate >= 80 ? 'high' : rate >= 50 ? 'mid' : 'low';
    rateTag = `<span class="correct-rate ${cls}">📊 ${rate}%</span>`;
  }

  card.innerHTML = `
    <div class="card-header">
      <span class="q-number">No.${q.id}</span>
      <span class="subject-tag" style="background:${color.tag}; color:${color.text};">
        ${escapeHTML(q.subject)}
      </span>
      ${rateTag}
      ${examTag}
    </div>
    <div class="card-body">
      <pre>${escapeHTML(q.question)}</pre>
      ${imageBtn}
    </div>
  `;
  return card;
}

function escapeHTML(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== 検索 =====
document.getElementById('searchInput').addEventListener('input', function() {
  currentSearch = this.value.trim();
  document.getElementById('searchClear').classList.toggle('visible', currentSearch.length > 0);
  renderCards();
});
document.getElementById('searchClear').addEventListener('click', function() {
  document.getElementById('searchInput').value = '';
  currentSearch = '';
  this.classList.remove('visible');
  renderCards();
});

// ===== スクロールトップ =====
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 300);
});

// ===== 画像モーダル =====
function convertImageUrl(url) {
  if (!url) return url;
  // パターン1: https://drive.google.com/file/d/ID/view...
  const m1 = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
  if (m1) return `https://lh3.googleusercontent.com/d/${m1[1]}`;
  // パターン2: https://drive.google.com/open?id=ID
  const m2 = url.match(/drive\.google\.com\/open\?id=([^&]+)/);
  if (m2) return `https://lh3.googleusercontent.com/d/${m2[1]}`;
  // パターン3: uc?export=view&id=ID
  const m3 = url.match(/[?&]id=([^&]+)/);
  if (m3) return `https://lh3.googleusercontent.com/d/${m3[1]}`;
  // それ以外はそのまま
  return url;
}

function showImage(url) {
  const modal = document.getElementById('imageModal');
  const img   = document.getElementById('modalImg');
  const err   = document.getElementById('modalError');
  img.style.display = 'block'; err.style.display = 'none';
  img.src = convertImageUrl(url);
  modal.classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('imageModal').classList.remove('visible');
  document.body.style.overflow = '';
}
function closeImage(e) {
  if (e.target === document.getElementById('imageModal')) closeModal();
}

// ===== 初期化 =====
async function init() {
  examMode = examParam;
  document.getElementById('loadingState').style.display = 'block';

  // ページタイトル設定
  if (examParam === 'all') {
    document.getElementById('pageTitle').textContent = '全試験 問題一覧';
    document.getElementById('pageSubtitle').textContent = '全試験・全科目から検索できます';
  } else if (EXAM_SOURCES[examParam]) {
    const src = EXAM_SOURCES[examParam];
    document.getElementById('pageTitle').textContent = src.name;
    document.getElementById('pageSubtitle').textContent = src.year;
  }

  try {
    const targets = examParam === 'all'
      ? Object.keys(EXAM_SOURCES)
      : (EXAM_SOURCES[examParam] ? [examParam] : []);

    // 全シートを並列で取得
    const results = await Promise.all(
      targets.map(async key => {
        const src  = EXAM_SOURCES[key];
        const text = await fetchCSV(src.sheetId, src.gid);
        return parseCSV(text, key);
      })
    );

    allQuestions = results.flat();

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('totalCount').textContent = `全 ${allQuestions.length} 問`;

    buildExamFilter(targets);
    buildSubjectFilter();
    buildSubjectCounts(allQuestions);
    renderCards();

  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorMsg').classList.add('visible');
    document.getElementById('totalCount').textContent = 'エラー';
    console.error(e);
  }
}

init();
</script>
