<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学内試験問題共有</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F4F1EC;
      --surface: #FFFFFF;
      --primary: #1A3A5C;
      --accent: #D4763B;
      --accent-light: #E89B67;
      --text: #1C1C1E;
      --text-muted: #6B6B6B;
      --border: #E0DBD2;
      --shadow: 0 4px 24px rgba(26,58,92,0.10);
      --shadow-hover: 0 8px 36px rgba(26,58,92,0.18);
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -80px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,118,59,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -80px;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26,58,92,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }

    .header-badge {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .header h1 span { color: var(--accent); }

    .header p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .divider {
      width: 48px; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      border-radius: 4px;
      margin: 16px auto 0;
    }

    .buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 24px 28px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--primary);
      box-shadow: var(--shadow);
      animation: fadeUp 0.6s 0.15s ease both;
    }
    .btn-primary:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }

    .btn-secondary {
      background: var(--surface);
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      animation: fadeUp 0.6s 0.25s ease both;
    }
    .btn-secondary:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border-color: #2B5F8E; }

    .btn-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .btn-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .btn-title { font-size: 20px; font-weight: 900; }
    .btn-desc  { font-size: 12px; font-weight: 400; opacity: 0.75; margin-top: 2px; }

    .btn-primary .btn-label { color: rgba(255,255,255,0.65); }
    .btn-primary .btn-title { color: #fff; }
    .btn-primary .btn-desc  { color: rgba(255,255,255,0.65); }

    .btn-secondary .btn-label { color: var(--accent); }
    .btn-secondary .btn-title { color: var(--primary); }
    .btn-secondary .btn-desc  { color: var(--text-muted); }

    .btn-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .btn-primary .btn-icon   { background: rgba(255,255,255,0.15); }
    .btn-secondary .btn-icon { background: rgba(26,58,92,0.07); }

    .btn-primary-strip {
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      background: linear-gradient(180deg, var(--accent), var(--accent-light));
      border-radius: 20px 0 0 20px;
    }

    .footer {
      margin-top: 48px;
      text-align: center;
      animation: fadeUp 0.6s 0.4s ease both;
    }
    .footer p { font-size: 12px; color: var(--text-muted); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-badge">Exam Sharing System</div>
      <h1>学内試験<br><span>問題共有</span></h1>
      <div class="divider"></div>
      <p style="margin-top:16px;">再現問題の投稿・閲覧ができます<br>みんなで知識をシェアしよう</p>
    </div>

    <div class="buttons">
      <!-- 回答する -->
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSd2vaFYU2jnAJS1XEAYz0F2FJ8d2Q_B_UgF21wr17Pm5__19A/viewform"
         class="btn btn-primary" target="_blank" rel="noopener">
        <div class="btn-primary-strip"></div>
        <div class="btn-content">
          <span class="btn-label">Contribute</span>
          <span class="btn-title">回答する</span>
          <span class="btn-desc">Googleフォームで問題を投稿</span>
        </div>
        <div class="btn-icon">✏️</div>
      </a>

      <!-- 問題を見る -->
      <a href="./questions.html" class="btn btn-secondary">
        <div class="btn-content">
          <span class="btn-label">Browse</span>
          <span class="btn-title">問題を見る</span>
          <span class="btn-desc">科目別に問題を閲覧する</span>
        </div>
        <div class="btn-icon">📚</div>
      </a>
    </div>

    <div class="footer">
      <p>© 2025 学内試験問題共有システム</p>
    </div>
  </div>
</body>
</html>
