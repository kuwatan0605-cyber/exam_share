<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>総合試験対策</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #B8E4F0;
      --bg-bottom: #D6F0FA;
      --surface: #FFFFFF;
      --primary: #1A6B8A;
      --primary-dark: #124E66;
      --accent: #2A9D8F;
      --accent-light: #52B8AC;
      --text: #0F3D4D;
      --text-muted: #4A7A8A;
      --border: #A8D8E8;
      --shadow: 0 4px 24px rgba(26,107,138,0.13);
      --shadow-hover: 0 8px 36px rgba(26,107,138,0.22);
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -100px; right: -80px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -80px; left: -60px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(42,157,143,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .container {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column;
      align-items: center;
      position: relative; z-index: 1;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease both;
    }
    .header-badge {
      display: inline-block;
      background: rgba(255,255,255,0.6);
      color: var(--primary-dark);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.8);
    }
    .header-title {
      display: flex;
      align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 10px;
    }
    .header h1 {
      font-size: 30px; font-weight: 900;
      color: var(--primary-dark); line-height: 1.2;
    }
    .tooth-emoji {
      font-size: 34px;
      animation: bounce 2s ease-in-out infinite;
    }
    .divider {
      width: 48px; height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent-light));
      border-radius: 4px;
      margin: 14px auto 0;
    }
    .buttons {
      width: 100%;
      display: flex; flex-direction: column;
      gap: 14px;
    }
    .btn {
      display: flex;
      align-items: center; justify-content: space-between;
      width: 100%; padding: 22px 28px;
      border: none; border-radius: var(--radius);
      cursor: pointer; text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      position: relative; overflow: hidden;
    }
    .btn:active { transform: scale(0.97); }

    /* 回答する */
    .btn-primary {
      background: var(--surface);
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      animation: fadeUp 0.6s 0.1s ease both;
    }
    .btn-primary:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border-color: var(--accent); }

    /* 問題を見る */
    .btn-secondary {
      background: var(--surface);
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      animation: fadeUp 0.6s 0.2s ease both;
    }
    .btn-secondary:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border-color: var(--accent); }

    /* 過去問 */
    .btn-tertiary {
      background: var(--surface);
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      animation: fadeUp 0.6s 0.3s ease both;
    }
    .btn-tertiary:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border-color: var(--accent); }

    .btn-content {
      display: flex; flex-direction: column;
      align-items: flex-start; gap: 4px;
    }
    .btn-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .btn-title { font-size: 19px; font-weight: 900; }
    .btn-desc  { font-size: 12px; font-weight: 400; opacity: 0.75; margin-top: 2px; }

    .btn-primary .btn-label  { color: var(--accent); }
    .btn-primary .btn-title  { color: var(--primary-dark); }
    .btn-primary .btn-desc   { color: var(--text-muted); }

    .btn-secondary .btn-label { color: var(--accent); }
    .btn-secondary .btn-title { color: var(--primary-dark); }
    .btn-secondary .btn-desc  { color: var(--text-muted); }

    .btn-tertiary .btn-label { color: var(--accent); }
    .btn-tertiary .btn-title { color: var(--primary-dark); }
    .btn-tertiary .btn-desc  { color: var(--text-muted); }

    .btn-icon {
      width: 46px; height: 46px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .btn-primary .btn-icon  { background: rgba(26,107,138,0.07); }
    .btn-secondary .btn-icon{ background: rgba(26,107,138,0.07); }
    .btn-tertiary .btn-icon { background: rgba(26,107,138,0.07); }

    .btn-strip {
      position: absolute; top: 0; left: 0;
      width: 4px; height: 100%;
      border-radius: 20px 0 0 20px;
    }
    .btn-primary .btn-strip { background: linear-gradient(180deg, var(--accent), var(--accent-light)); }

    .footer {
      margin-top: 36px; text-align: center;
      animation: fadeUp 0.6s 0.4s ease both;
    }
    .footer p { font-size: 12px; color: var(--text-muted); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-badge">Exam Sharing System</div>
      <div class="header-title">
        <h1>総合試験対策</h1>
        <span class="tooth-emoji">🦷</span>
      </div>
      <div class="divider"></div>
    </div>

    <div class="buttons">

      <!-- 回答する -->
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSd2vaFYU2jnAJS1XEAYz0F2FJ8d2Q_B_UgF21wr17Pm5__19A/viewform"
         class="btn btn-primary" target="_blank" rel="noopener">
        <div class="btn-strip"></div>
        <div class="btn-content">
          <span class="btn-label">Contribute</span>
          <span class="btn-title">回答する</span>
          <span class="btn-desc">Googleフォームで問題を投稿</span>
        </div>
        <div class="btn-icon">✏️</div>
      </a>

      <!-- 問題を見る -->
      <a href="./questions.html" class="btn btn-secondary">
        <div class="btn-content">
          <span class="btn-label">Browse</span>
          <span class="btn-title">問題を見る</span>
          <span class="btn-desc">試験・科目別に問題を閲覧する</span>
        </div>
        <div class="btn-icon">📚</div>
      </a>

      <!-- 過去問(PDF) -->
      <a href="./past.html" class="btn btn-tertiary">
        <div class="btn-strip"></div>
        <div class="btn-content">
          <span class="btn-label">Past Exams</span>
          <span class="btn-title">過去問 (PDF)</span>
          <span class="btn-desc">過去の試験問題を閲覧する</span>
        </div>
        <div class="btn-icon">📄</div>
      </a>

    </div>

    <div class="footer"><p>© 2025 総合試験対策</p></div>
  </div>
</body>
</html>
