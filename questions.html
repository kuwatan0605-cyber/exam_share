<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>試験を選ぶ | 総合試験対策</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #B8E4F0;
      --bg-bottom: #D6F0FA;
      --surface: #FFFFFF;
      --primary: #1A6B8A;
      --primary-dark: #124E66;
      --accent: #2A9D8F;
      --text: #0F3D4D;
      --text-muted: #4A7A8A;
      --border: #A8D8E8;
      --shadow: 0 4px 20px rgba(26,107,138,0.12);
      --shadow-hover: 0 8px 32px rgba(26,107,138,0.20);
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      min-height: 100vh;
      padding: 0 0 60px;
    }
    .header {
      background: var(--primary);
      padding: 20px 20px 24px;
      display: flex; align-items: center; gap: 14px;
    }
    .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,0.15);
      color: #fff; text-decoration: none;
      font-size: 18px; flex-shrink: 0;
    }
    .back-btn:active { background: rgba(255,255,255,0.25); }
    .header-text h1 { font-size: 18px; font-weight: 900; color: #fff; }
    .header-text p  { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }

    .main { padding: 28px 20px 0; max-width: 500px; margin: 0 auto; }

    .section-label {
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 14px;
    }

    .all-btn {
      display: flex;
      align-items: center; justify-content: space-between;
      width: 100%; padding: 20px 22px;
      background: var(--primary);
      border: none; border-radius: var(--radius);
      cursor: pointer; text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 20px;
    }
    .all-btn:hover  { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .all-btn:active { transform: scale(0.97); }
    .all-btn-left { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; }
    .all-btn-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.6); letter-spacing: 0.08em; text-transform: uppercase; }
    .all-btn-title { font-size: 18px; font-weight: 900; color: #fff; }
    .all-btn-desc  { font-size: 12px; color: rgba(255,255,255,0.6); }
    .all-btn-icon  { font-size: 28px; }

    .exam-list { display: flex; flex-direction: column; gap: 12px; }

    .exam-card {
      display: flex;
      align-items: center; justify-content: space-between;
      padding: 18px 20px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer; text-decoration: none;
      border-left: 4px solid var(--border);
      transition: transform 0.15s, box-shadow 0.15s;
      animation: fadeUp 0.3s ease both;
    }
    .exam-card:hover  { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .exam-card:active { transform: scale(0.97); }

    .exam-card-left { display: flex; flex-direction: column; gap: 4px; }
    .exam-year  { font-size: 11px; font-weight: 700; color: var(--text-muted); }
    .exam-name  { font-size: 16px; font-weight: 900; color: var(--primary-dark); }
    .exam-count { font-size: 12px; color: var(--text-muted); }
    .exam-arrow { font-size: 18px; color: var(--text-muted); }

    /* sampleバッジ */
    .badge-sample {
      font-size: 10px; font-weight: 700;
      background: rgba(42,157,143,0.15);
      color: #2A9D8F;
      padding: 2px 8px; border-radius: 100px;
      margin-top: 2px;
      display: inline-block;
    }

    .coming-soon {
      opacity: 0.5;
      pointer-events: none;
    }
    .badge-soon {
      font-size: 11px; font-weight: 700;
      background: #E8E8E8; color: #888;
      padding: 3px 8px; border-radius: 100px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="./index.html" class="back-btn">←</a>
    <div class="header-text">
      <h1>試験を選ぶ</h1>
      <p>閲覧したい試験を選択してください</p>
    </div>
  </div>

  <div class="main">

    <!-- 全部まとめて見る -->
    <a href="./viewer.html?exam=all" class="all-btn">
      <div class="all-btn-left">
        <span class="all-btn-label">All Exams</span>
        <span class="all-btn-title">全試験まとめて見る</span>
        <span class="all-btn-desc">科目フィルタで絞り込みができます</span>
      </div>
      <span class="all-btn-icon">📚</span>
    </a>

    <div class="section-label">試験別に見る</div>

    <div class="exam-list">

      <!-- 5年総合試験② -->
      <a href="./viewer.html?exam=5nen2" class="exam-card" style="border-left-color:#2A9D8F; animation-delay:0.05s;">
        <div class="exam-card-left">
          <span class="exam-year">2025年</span>
          <span class="exam-name">5年 総合試験②</span>
        </div>
        <span class="exam-arrow">›</span>
      </a>

      <!-- sample -->
      <a href="./viewer.html?exam=6nen1" class="exam-card" style="border-left-color:#3B7D9E; animation-delay:0.10s;">
        <div class="exam-card-left">
          <span class="exam-year">sample</span>
          <span class="exam-name">sample</span>
        </div>
        <span class="exam-arrow">›</span>
      </a>

      <!-- 6年総合試験①（2026年4月1日から有効） -->
      <div class="exam-card" id="card-6nen1" style="border-left-color:#3B7D9E; animation-delay:0.15s; display:none;"
           onclick="location.href='./viewer.html?exam=6nen1'">
        <div class="exam-card-left">
          <span class="exam-year">2026年</span>
          <span class="exam-name">6年 総合試験①</span>
        </div>
        <span class="exam-arrow">›</span>
      </div>
      <div class="exam-card coming-soon" id="soon-6nen1" style="animation-delay:0.15s;">
        <div class="exam-card-left">
          <span class="exam-year">2026年（予定）</span>
          <span class="exam-name">6年 総合試験①</span>
        </div>
        <span class="badge-soon">Coming Soon</span>
      </div>

      <!-- 6年総合試験②（2026年7月1日から有効） -->
      <div class="exam-card" id="card-6nen2" style="border-left-color:#7B5EA7; animation-delay:0.20s; display:none;"
           onclick="location.href='./viewer.html?exam=6nen2'">
        <div class="exam-card-left">
          <span class="exam-year">2026年</span>
          <span class="exam-name">6年 総合試験②</span>
        </div>
        <span class="exam-arrow">›</span>
      </div>
      <div class="exam-card coming-soon" id="soon-6nen2" style="animation-delay:0.20s;">
        <div class="exam-card-left">
          <span class="exam-year">2026年（予定）</span>
          <span class="exam-name">6年 総合試験②</span>
        </div>
        <span class="badge-soon">Coming Soon</span>
      </div>

      <!-- 6年総合試験③（2026年10月1日から有効） -->
      <div class="exam-card" id="card-6nen3" style="border-left-color:#D4763B; animation-delay:0.25s; display:none;"
           onclick="location.href='./viewer.html?exam=6nen3'">
        <div class="exam-card-left">
          <span class="exam-year">2026年</span>
          <span class="exam-name">6年 総合試験③</span>
        </div>
        <span class="exam-arrow">›</span>
      </div>
      <div class="exam-card coming-soon" id="soon-6nen3" style="animation-delay:0.25s;">
        <div class="exam-card-left">
          <span class="exam-year">2026年（予定）</span>
          <span class="exam-name">6年 総合試験③</span>
        </div>
        <span class="badge-soon">Coming Soon</span>
      </div>

      <!-- 6年卒業試験（2026年12月1日から有効） -->
      <div class="exam-card" id="card-6sotsu" style="border-left-color:#B94040; animation-delay:0.30s; display:none;"
           onclick="location.href='./viewer.html?exam=6sotsu'">
        <div class="exam-card-left">
          <span class="exam-year">2026年</span>
          <span class="exam-name">6年 卒業試験</span>
        </div>
        <span class="exam-arrow">›</span>
      </div>
      <div class="exam-card coming-soon" id="soon-6sotsu" style="animation-delay:0.30s;">
        <div class="exam-card-left">
          <span class="exam-year">2026年（予定）</span>
          <span class="exam-name">6年 卒業試験</span>
        </div>
        <span class="badge-soon">Coming Soon</span>
      </div>

    </div>
  </div>

<script>
// ============================================================
//  試験ボタンの自動有効化
//  指定日になると Coming Soon → 有効なボタンに切り替わります
// ============================================================
const ACTIVATE_SCHEDULE = [
  { key: '6nen1',  date: new Date('2026-04-01T00:00:00+09:00') },
  { key: '6nen2',  date: new Date('2026-07-01T00:00:00+09:00') },
  { key: '6nen3',  date: new Date('2026-10-01T00:00:00+09:00') },
  { key: '6sotsu', date: new Date('2026-12-01T00:00:00+09:00') },
];

const now = new Date();
ACTIVATE_SCHEDULE.forEach(({ key, date }) => {
  if (now >= date) {
    // 有効カードを表示、Coming Soonを非表示
    const card = document.getElementById(`card-${key}`);
    const soon = document.getElementById(`soon-${key}`);
    if (card) card.style.display = 'flex';
    if (soon) soon.style.display = 'none';
  }
});
</script>
</body>
</html>
